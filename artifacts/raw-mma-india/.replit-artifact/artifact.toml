kind = "web"
previewPath = "/"
title = "RAW MMA India — Strategy"
version = "1.0.0"
id = "artifacts/raw-mma-india"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19407

[services.development]
run = "pnpm --filter @workspace/raw-mma-india run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/raw-mma-india", "run", "build" ]
publicDir = "artifacts/raw-mma-india/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19407"
BASE_PATH = "/"
